name: Release

# Fully automatic npm publish. On every push to `main` it compares the version in
# package.json against what's already on npm: if it's new, it builds, tests and
# publishes; if it's unchanged, it skips cleanly (no failure). So the entire
# release flow is just: bump the version, commit, push.
on:
  push:
    branches: [main]
  workflow_dispatch: # allow a manual run from the Actions tab too

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm provenance / trusted publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release # optional GitHub Environment; lets you scope the NPM_TOKEN secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Detect whether this version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "✅ $NAME@$VERSION is already on npm — nothing to publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "📦 $NAME@$VERSION is new — will build, test and publish."
          fi

      - name: Typecheck
        if: steps.check.outputs.published == 'false'
        run: npm run typecheck

      - name: Test (builds via pretest)
        if: steps.check.outputs.published == 'false'
        run: npm test

      - name: Publish to npm
        if: steps.check.outputs.published == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Summary
        if: steps.check.outputs.published == 'false'
        run: echo "🚀 Published ${{ steps.check.outputs.name }}@${{ steps.check.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
