name: Release

# Publishes to npm when a GitHub Release is published. Bump the version in
# package.json, push a tag, and create a Release — this workflow does the rest.
# Can also be run manually from the Actions tab (workflow_dispatch).
on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # required for npm provenance / trusted publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release # optional GitHub Environment; lets you scope the NPM_TOKEN secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Guard — version not already on npm
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "Releasing $NAME@$VERSION"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "::error::$NAME@$VERSION is already published. Bump the version in package.json."
            exit 1
          fi

      - name: Typecheck
        run: npm run typecheck

      - name: Test (builds via pretest)
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
