name: Release

# Automatic versioned npm publish. On every push to `main` that touches the
# library (src / build config / package.json), it resolves the next version
# (auto-bumps PATCH from the latest version on npm, or respects a manual
# minor/major bump in package.json), then: tests, builds, publishes to npm,
# commits the version bump back, and creates a git tag + GitHub Release.
#
# So you never have to touch the version: just push. To force a minor/major,
# bump package.json yourself and push — that exact version is published.
on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'tsup.config.ts'
      - 'tsconfig.json'
  workflow_dispatch: # allow a manual run from the Actions tab too

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write # push the version-bump commit + tag, create the release
  id-token: write # npm provenance / trusted publishing

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: release # optional GitHub Environment; scopes the NPM_TOKEN secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve next version
        id: ver
        run: node scripts/release-version.mjs

      - name: Typecheck
        run: npm run typecheck

      - name: Test (builds via pretest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Update CHANGELOG
        run: node scripts/update-changelog.mjs

      - name: Commit version bump + changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json CHANGELOG.md
          if git diff --staged --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "chore(release): v${{ steps.ver.outputs.version }} [skip ci]"
            git push origin HEAD:main
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create git tag
        run: |
          git tag "v${{ steps.ver.outputs.version }}"
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.version }}
          name: v${{ steps.ver.outputs.version }}
          generate_release_notes: true # GitHub's auto notes; CHANGELOG.md is the in-repo record

      - name: Summary
        run: |
          echo "🚀 Published ${{ github.event.repository.name }}@${{ steps.ver.outputs.version }} (previous: ${{ steps.ver.outputs.previous }})" >> "$GITHUB_STEP_SUMMARY"
